# Training Configuration - Gemma 2B QLoRA Fine-tuning

model:
  name: "google/gemma-2b"
  max_seq_length: 512
  load_in_4bit: true

lora:
  r: 16                    # LoRA rank
  alpha: 32                # LoRA alpha (usually 2x rank)
  dropout: 0.05
  target_modules:
    - "q_proj"
    - "v_proj"
    - "k_proj"
    - "o_proj"

training:
  num_epochs: 3
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 4
  learning_rate: 2.0e-4
  warmup_ratio: 0.03
  lr_scheduler: "cosine"
  weight_decay: 0.001
  fp16: true
  logging_steps: 10
  save_steps: 100
  eval_steps: 100
  output_dir: "./models/adapters"

data:
  train_split: 0.9
  val_split: 0.1
  dataset_path: "./data/processed/dataset.json"
